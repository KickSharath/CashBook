<div aria-live="polite" aria-atomic="true" class="position-fixed top-0 end-0 p-3" style="z-index: 9999;">
  <div *ngFor="let toast of toasts" 
       class="toast show" 
       role="alert" 
       aria-live="assertive" 
       aria-atomic="true"
       [@fadeInOut]>
    <div class="toast-header">
      <span class="toast-icon" [innerHTML]="getToastIcon(toast.type)"></span>
      <strong class="me-auto">{{ getToastTitle(toast.type) }}</strong>
      <small class="text-body-secondary">{{ getTimeAgo(toast.timestamp) }}</small>
      <button type="button" 
              class="btn-close" 
              (click)="removeToast(toast.id)" 
              aria-label="Close"></button>
    </div>
    <div class="toast-body">
      {{ toast.message }}
    </div>
  </div>
</div>
